<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RH console · Cutset</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0;url=app.html">
<meta name="theme-color" content="#080a0e">
<link rel="canonical" href="https://cutset.io/login.html">
<style>
:root{
  --bg:#080a0e; --surface:#0d1118; --line:#222c3c; --line2:#3a465a;
  --ink:#f1f3f7; --copy:#bbc4d3; --muted:#818b9d;
  --accent:#f16d64; --accent2:#ffa297;
  --mono:"SF Mono",SFMono-Regular,ui-monospace,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(700px 400px at 50% -10%,rgba(241,109,100,.14),transparent 65%),var(--bg);color:var(--ink);font:16px/1.5 var(--sans);display:flex;flex-direction:column}
a{color:var(--accent2)}
.top{padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.brand{color:var(--ink);font-weight:780;font-size:19px;letter-spacing:-.03em;text-decoration:none}
.brand i{color:var(--accent);font-style:normal}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px 26px}
.kicker{color:var(--accent);font:700 11px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
h1{font-size:28px;letter-spacing:-.03em;margin-bottom:8px}
.dek{color:var(--copy);font-size:14px;margin-bottom:22px}
label{display:block;font:12px/1 var(--mono);color:var(--muted);margin:0 0 7px}
input{width:100%;background:#0a0e14;border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:12px 13px;font:15px/1.3 var(--sans);margin-bottom:14px}
input:focus{outline:2px solid var(--accent);outline-offset:1px}
button{width:100%;appearance:none;border:0;border-radius:8px;background:var(--accent);color:#140806;font:650 14px/1 var(--sans);padding:13px 14px;cursor:pointer;margin-top:4px}
button:hover{filter:brightness(1.05)}
.err{display:none;margin-top:12px;color:#ff8f86;font-size:13px}
.err.show{display:block}
.note{margin-top:18px;color:var(--muted);font-size:12px;line-height:1.45}
</style>
</head>
<body>
<div class="top">
  <a class="brand" href="/">Cutset<i>.</i></a>
</div>
<main class="main">
  <div class="card">
    <div class="kicker">Authentication moved to private backend</div>
    <h1>Opening RH console</h1>
    <p class="dek">The public console is a sanitized read-only projection. Static hosting cannot protect private state or launch authority.</p>
    <p class="note"><a href="app.html">Continue if you are not redirected.</a></p>
  </div>
</main>
</body>
</html>
